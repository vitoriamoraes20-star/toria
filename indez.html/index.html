<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎬 MovieFlix</h1>
    <input type="text" id="pesquisa" placeholder="Pesquisar filmes ou séries...">
</header>

<section class="catalogo" id="catalogo">

    <div class="card">
        <img src="https://picsum.photos/300/450?1">
        <h2>Breaking Bad</h2>
        <p>Série</p>
        <button>Assistir</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/450?2">
        <h2>Interestelar</h2>
        <p>Filme</p>
        <button>Assistir</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/450?3">
        <h2>The Boys</h2>
        <p>Série</p>
        <button>Assistir</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/450?4">
        <h2>Avatar</h2>
        <p>Filme</p>
        <button>Assistir</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
